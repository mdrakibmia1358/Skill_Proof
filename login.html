<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillProof - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="app-header">
    <div class="brand">SkillProof</div>
    <nav class="app-nav">
      <a href="home.html">Dashboard</a>
      <a href="login.html" class="active">Login</a>
      <a href="register.html">Register</a>
    </nav>
  </header>

  <main class="dashboard-wrapper">

    <section class="banner-section">
      <span class="banner-eyebrow">Account Access</span>
      <h1>Login to SkillProof</h1>
      <p>Access your verified developer profile and reports.</p>
    </section>

    <section class="form-section">
      <div class="form-card">
        <h2>Welcome back</h2>
        <p class="form-sub">Enter your credentials to continue.</p>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password">
        </div>

        <button class="btn-primary">Login</button>

        <p>Don't have an account? <a href="register.html">Register here</a></p>
      </div>
    </section>

  </main>

  <footer class="app-footer">
    <p>&copy; 2026 SkillProof — Evidence-Based Developer Assessment Platform</p>
  </footer>

</body>
</html>
